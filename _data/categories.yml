# 新闻分类配置。
# 键名 = 仓库根目录下的文件夹名。新增一个新闻类型时：
#   1. 建一个新文件夹，按 YYYY-MM-DD.md 存放每日简报（首页和导航会自动出现，无需改代码）；
#   2. 把任意现有分类的 index.md（仅 3 行）复制到新文件夹，即可获得 /<文件夹名>/ 归档页，
#      顶部导航也会优先指向它（没有 index.md 时导航退化为指向该分类最新一期）；
#   3. （可选）在这里加一条配置，自定义显示名称、emoji、主题色和一句话描述，
#      不配置时默认显示文件夹名 + 📰 + 灰色。
AI:
  name: AI 日报
  emoji: 🤖
  color: "#6366f1"
  desc: 人工智能行业每日要闻
Dating-Social-Apps:
  name: 交友与社交应用日报
  emoji: 💬
  color: "#e11d63"
  desc: 交友与社交产品行业每日要闻
